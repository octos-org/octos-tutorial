# 04-human-gate — Pipeline with operator approval gates
#
# Gate nodes pause the pipeline and check GATE_POLICY before proceeding.
# If a gate is rejected, the next tool step is skipped.
#
# Default: GATE_POLICY="Station A,home" approves A and home, rejects B.
# Change to "all" to approve everything, or customize the list.
#
# Run:
#   cd 04-human-gate
#   dora up && dora start dataflow.yaml --attach

nodes:
  - id: mock-robot
    path: nodes/mock_robot_node.py
    inputs:
      skill_request: agent/skill_request
    outputs:
      - skill_result

  - id: agent
    path: nodes/agent_node.py
    inputs:
      skill_result: mock-robot/skill_result
    outputs:
      - skill_request
    env:
      OCTOS_PIPELINE: "inspection_gated.dot"
      GATE_POLICY: "Station A,home"
      USER_COMMAND: "Execute gated inspection: gates approve A and home, reject B"
